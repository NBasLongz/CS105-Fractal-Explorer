<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sierpinski Systems — CS105</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <script type="module" src="./main.js"></script>
  <style>
    .tab-row { display: flex; gap: 8px; justify-content: center; margin-bottom: 20px; }
    .tab-btn {
      background: var(--surface); border: 1px solid var(--border); color: var(--muted);
      padding: 7px 22px; border-radius: 9px; cursor: pointer; font-size: 0.8rem;
      font-family: 'Inter', sans-serif; font-weight: 500; transition: all 0.15s;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }
    .tab-btn.on { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
    .tab-panel { display: none; flex-direction: column; align-items: center; width: 100%; }
    .tab-panel.on { display: flex; }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-logo">
      <div class="logo-mark">
        <svg viewBox="0 0 12 12"><polyline points="1,6 3,3 5,6 7,3 9,6 11,3" /></svg>
      </div>
      Fractal Explorer
    </div>
    <div class="topbar-div"></div>
    <div class="topbar-pill">CS105 · WebGL</div>
    <button class="back-btn show" onclick="window.location.href='../index.html'">← Trang chủ</button>
  </header>

  <div class="fp on" id="sierpinski">
    <div class="fp-inner">
      <div class="pg-kicker">03 / 04 · CPU Geometry</div>
      <h2 class="pg-h">Sierpinski Systems</h2>
      <p class="pg-sub">Tự tương đồng đệ quy — diện tích tiến về 0</p>

      <!-- Tab buttons -->
      <div class="tab-row">
        <button class="tab-btn on" id="tabTriBtn" onclick="switchTab('triangle')">🔺 Triangle</button>
        <button class="tab-btn" id="tabCarpetBtn" onclick="switchTab('carpet')">🟫 Carpet</button>
      </div>

      <!-- Triangle panel -->
      <div class="tab-panel on" id="panelTriangle">
        <p class="pg-sub" style="margin-bottom:16px;">3ⁿ tam giác tại level n</p>
        <div class="cw">
          <canvas id="stC"></canvas>
          <div class="c-badge" id="stB">1 triangle</div>
        </div>
        <div class="ctrl">
          <button class="cbtn" onclick="stCh(-1)">−</button>
          <div class="clvl">
            <div class="clvl-n" id="stL">0</div>
            <div class="clvl-l">Level / 10</div>
          </div>
          <button class="cbtn" onclick="stCh(1)">+</button>
        </div>
        <div class="hint">Level 10 → 59,049 tam giác</div>
      </div>

      <!-- Carpet panel -->
      <div class="tab-panel" id="panelCarpet">
        <p class="pg-sub" style="margin-bottom:16px;">8ⁿ ô tại level n</p>
        <div class="cw">
          <canvas id="scC"></canvas>
          <div class="c-badge" id="scB">1 square</div>
        </div>
        <div class="ctrl">
          <button class="cbtn" onclick="scCh(-1)">−</button>
          <div class="clvl">
            <div class="clvl-n" id="scL">0</div>
            <div class="clvl-l">Level / 8</div>
          </div>
          <button class="cbtn" onclick="scCh(1)">+</button>
        </div>
        <div class="hint">Level 8 → 16.7M ô · máy yếu dùng level ≤6</div>
      </div>
    </div>
  </div>

  <script>
    window.switchTab = function(tab) {
      const isTriangle = tab === 'triangle';
      document.getElementById('panelTriangle').classList.toggle('on', isTriangle);
      document.getElementById('panelCarpet').classList.toggle('on', !isTriangle);
      document.getElementById('tabTriBtn').classList.toggle('on', isTriangle);
      document.getElementById('tabCarpetBtn').classList.toggle('on', !isTriangle);
    };
  </script>
</body>
</html>
